name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# One in-flight run per ref; newer pushes cancel older runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build + test (boundaries, unit, integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore WFM-Product.slnx

      - name: Format check (analyzers + style)
        run: dotnet format WFM-Product.slnx --verify-no-changes --no-restore

      # warnings-are-errors is enforced per-project via Directory.Build.props
      # (strict on src, relaxed on test harnesses), so no global flag here.
      - name: Build
        run: dotnet build WFM-Product.slnx --no-restore --configuration Release

      # Docker is available on ubuntu-latest, so the Testcontainers integration
      # suite runs for real here (it skips on dev machines without Docker).
      - name: Test
        run: dotnet test WFM-Product.slnx --no-build --configuration Release --verbosity normal

  # Browser e2e (ADR-006): one smoke flow against the full stack. Separate job so a
  # flaky UI test never blocks the core gate while we build confidence in it.
  e2e:
    name: e2e (browser smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start the full stack
        run: docker compose up -d --build

      - name: Wait for the API and UI
        run: |
          for i in $(seq 1 90); do
            if curl -sf http://localhost:8080/health >/dev/null && curl -sf http://localhost:5173 >/dev/null; then
              echo "stack ready"; exit 0
            fi
            sleep 2
          done
          echo "stack did not become ready" >&2
          docker compose ps >&2
          docker compose logs --tail=80 api frontend >&2
          exit 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install test dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run e2e
        working-directory: frontend
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

      - name: Stop the stack
        if: always()
        run: docker compose down -v

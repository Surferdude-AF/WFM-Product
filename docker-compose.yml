services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wfm
    ports:
      - "5432:5432"
    volumes:
      - wfm-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wfm"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot: applies forward-only migrations as the DB owner (creates schema,
  # the wfm_app role, and the RLS policies), then exits. Runs before the API.
  migrate:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - ./efbundle
      - --connection
      - "Host=postgres;Port=5432;Database=wfm;Username=postgres;Password=postgres"
    restart: "no"

  # The API connects as the RLS-subject app role, never the owner (ADR-001).
  api:
    build: .
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      ConnectionStrings__Wfm: "Host=postgres;Port=5432;Database=wfm;Username=wfm_app;Password=wfm_app"
      # The in-process forecast worker connects as the platform role (step 11b).
      ConnectionStrings__WfmWorker: "Host=postgres;Port=5432;Database=wfm;Username=wfm_worker;Password=wfm_worker"
    ports:
      - "8080:8080"

volumes:
  wfm-pgdata:

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wfm
    ports:
      - "5432:5432"
    volumes:
      - wfm-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wfm"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  wfm-pgdata:
